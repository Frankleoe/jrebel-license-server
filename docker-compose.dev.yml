# 本地开发测试用（无需 SSL）
services:
  jrebel-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: jrebel-license-server-dev
    ports:
      - "8080:8080"
    environment:
      - JRebel_Server_URL=http://localhost:8080
      - JRebel_Token=dev-test-token-12345
      - JRebel_Proxy_Target=https://www.jrebel.com
      - PORT=8080
    restart: unless-stopped
