# 本地开发测试
services:
  jrebel-app:
    build: ./app
    container_name: jrebel-license-server-dev
    ports:
      - "9000:9000"
    environment:
      - JRebel_Server_URL=http://localhost:9000
      - JRebel_Token=dev-test-token-12345
      - JRebel_Proxy_Target=https://www.jrebel.com
      - PORT=9000
    restart: unless-stopped
