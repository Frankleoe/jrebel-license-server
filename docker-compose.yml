# JRebel License Server - 生产部署
# 使用 GitHub Container Registry 镜像
#
# 方式一: 直接使用预构建镜像（推荐）
#   docker compose up -d
#
# 方式二: 本地构建
#   DOCKER_BUILDKIT=1 docker compose up -d --build

services:
  jrebel-app:
    image: ghcr.io/frankleoe/jrebel-license-server:latest
    container_name: jrebel-license-server
    restart: unless-stopped
    environment:
      - JRebel_Server_URL=https://jrebel.afrank.cn
      - JRebel_Token=553ebb30-c42c-7d0c-9cda-032ecb55286c
      - JRebel_Proxy_Target=https://www.jrebel.com
      - PORT=8080
    networks:
      - jrebel-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: jrebel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL 证书（Cloudflare Flexible SSL 可跳过此步）
      # - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      jrebel-app:
        condition: service_healthy
    networks:
      - jrebel-net
    entrypoint: |
      /bin/sh -c "
        cat > /etc/nginx/conf.d/default.conf << 'EOF'
        server {
            listen 80;
            server_name jrebel.afrank.cn;

            # 如果使用 Cloudflare Flexible SSL，直连 HTTP
            location / {
                proxy_pass http://jrebel-app:8080;
                proxy_http_version 1.1;
                proxy_set_header Host $$host;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $$scheme;
            }
        }
        EOF
        nginx -g 'daemon off;'
      "

networks:
  jrebel-net:
    driver: bridge
