server {
    listen 80;
    server_name jrebel.afrank.cn;

    # 重定向到 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name jrebel.afrank.cn;

    # SSL 配置（使用 Let's Encrypt 或商业证书）
    # 请将证书放在 /etc/nginx/ssl/ 目录
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Gzip 压缩
    gzip on;
    gzip_types application/json text/plain application/javascript;

    # 反向代理到 FastAPI
    location / {
        proxy_pass http://jrebel-app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # 静态文件缓存
    location ~* \.(ico|png|jpg|jpeg)$ {
        proxy_pass http://jrebel-app:8080;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 日志
    access_log /var/log/nginx/jrebel_access.log;
    error_log  /var/log/nginx/jrebel_error.log;
}
